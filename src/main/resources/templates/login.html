<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact ERP | Acesso Restrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            /* Fundo escuro tecnológico */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .logo-icon {
            font-size: 3.5rem;
            color: #0d6efd;
            margin-bottom: 10px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 15px;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
            color: white;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-login {
            background: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <i class="bi bi-cpu logo-icon"></i>
        <h3 class="text-white fw-bold mb-1">Impact ERP | Logistica</h3>
        <p class="text-white-50 mb-4 small">Gestão de Automação Inteligente</p>

        <div th:if="${param.error}" class="alert alert-danger py-2 small border-0 bg-danger text-white bg-opacity-75">
            <i class="bi bi-exclamation-triangle"></i> Usuário ou senha incorretos!
        </div>
        
        <div th:if="${param.logout}" class="alert alert-success py-2 small border-0 bg-success text-white bg-opacity-75">
            <i class="bi bi-check-circle"></i> Você saiu com segurança.
        </div>

        <form th:action="@{/login}" method="POST">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}" />
            <div class="mb-3 text-start">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-light border-opacity-25 text-white-50"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="Usuário" required autofocus>
                </div>
            </div>
            
            <div class="mb-4 text-start">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-light border-opacity-25 text-white-50"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="Senha" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100 rounded-3">
                ENTRAR NO SISTEMA <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>
		        <div class="mt-4 pt-3 border-top border-light border-opacity-10">
		            <small class="text-white-50">&copy; 2026 Impact Automações</small>
		        </div>
		    </div>

		</body>
		</html>
