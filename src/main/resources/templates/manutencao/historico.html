<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Histórico de Manutenção')}"></head>
<body class="bg-light text-dark">

    <div th:replace="~{fragments/menu :: sidebar('veiculos')}"></div>

    <!-- 1. CORREÇÃO: WRAPPER RESPONSIVO EM VEZ DE MARGEM FIXA -->
    <div class="content-wrapper">
        <div class="container-fluid" style="max-width: 1200px;">
            
            <!-- 2. CORREÇÃO: CABEÇALHO EM COLUNA NO CELULAR, LINHA NO PC -->
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                <div>
                    <h2 class="text-secondary fw-bold mb-1">
                        <i class="bi bi-tools text-primary"></i> Oficina: <span th:text="${veiculo.placa}"></span>
                    </h2>
                    <p class="text-muted mb-0" th:text="${veiculo.marcaModelo}">Histórico de Manutenções</p>
                </div>
                
                <!-- BOTÕES ESTICADOS NO CELULAR (d-grid) -->
                <div class="d-grid gap-2 d-md-block">
                    <a th:href="@{/veiculos}" class="btn btn-outline-secondary rounded-pill px-4 me-md-2 fw-bold py-2">
                        Voltar
                    </a>
                    <a th:href="@{/manutencoes/novo/{id}(id=${veiculo.id})}" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold py-2">
                        <i class="bi bi-plus-lg me-1"></i> Registrar Conserto
                    </a>
                </div>
            </div>

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-0">
                    
                    <!-- 3. CORREÇÃO: TABELA RESPONSIVA COM TEXT-NOWRAP -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 text-dark text-nowrap">
                            <thead class="table-dark">
                                <tr>
                                    <th class="ps-4">Data</th>
                                    <th>Serviço / Oficina</th>
                                    <th>Tipo</th>
                                    <th>KM</th>
                                    <th>Valor</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="m : ${manutencoes}">
                                    <td class="ps-4 fw-bold" th:text="${#temporals.format(m.dataManutencao, 'dd/MM/yyyy')}"></td>
                                    <td>
                                        <span class="fw-bold" th:text="${m.servico}"></span><br>
                                        <small class="text-muted" th:text="${m.oficina}"></small>
                                    </td>
                                    <td>
                                        <span class="badge bg-info text-dark" th:if="${m.tipo == 'Preventiva'}">Preventiva</span>
                                        <span class="badge bg-danger" th:if="${m.tipo == 'Corretiva'}">Corretiva</span>
                                    </td>
                                    <td th:text="${m.quilometragem} + ' KM'"></td>
                                    <td class="text-danger fw-bold" th:text="'R$ ' + ${#numbers.formatDecimal(m.valorTotal, 1, 'POINT', 2, 'COMMA')}"></td>
                                    <td>
                                        <span class="badge bg-success" th:if="${m.status == 'Concluída'}">Concluída</span>
                                        <span class="badge bg-warning text-dark" th:if="${m.status != 'Concluída'}" th:text="${m.status}">Agendada</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(manutencoes)}">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i class="bi bi-wrench-adjustable-circle fs-1 d-block mb-2 text-secondary"></i>
                                        Nenhuma manutenção registrada para este veículo.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments/base :: scripts}"></div>
</body>
</html>
