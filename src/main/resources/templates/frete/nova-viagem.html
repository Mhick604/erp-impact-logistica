<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <div th:replace="~{fragments/base :: head('Nova Viagem - Roteirização')}"></div>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .leaflet-container { font-family: 'Segoe UI', sans-serif !important; }
        /* 1. CORREÇÃO: MAPA INTELIGENTE (Altura mínima menor no celular) */
        #mapaRota { height: 100%; min-height: 400px; width: 100%; border-radius: 15px; background: #f8f9fa; z-index: 1; }
        @media (min-width: 992px) { #mapaRota { min-height: 700px; } }
        
        .card-form { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .section-title { font-size: 0.75rem; font-weight: 800; color: #0d6efd; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px; }
    </style>
</head>
<body class="bg-light text-dark">
    
    <div th:replace="~{fragments/menu :: sidebar('fretes')}"></div>

    <!-- 2. CORREÇÃO: WRAPPER RESPONSIVO -->
    <div class="content-wrapper">
        <div class="container-fluid" style="max-width: 1600px;">
            <form th:action="@{/fretes/salvar}" th:object="${frete}" method="POST">
                <input type="hidden" th:field="*{id}">

                <!-- 3. CORREÇÃO: CABEÇALHO EM COLUNA NO CELULAR -->
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                    <div>
                        <h2 class="fw-bold text-dark mb-0">📍 Nova Ordem de Serviço</h2>
                        <p class="text-muted mb-0">Preencha os dados e calcule a rota.</p>
                    </div>
                    
                    <!-- BOTÕES ESTICADOS NO CELULAR (d-grid) -->
                    <div class="d-grid gap-2 d-md-block">
                        <a th:href="@{/fretes}" class="btn btn-outline-secondary rounded-pill px-4 me-md-2 fw-bold">Cancelar</a>
                        <button type="submit" class="btn btn-success rounded-pill px-5 shadow fw-bold">Finalizar e Salvar OS</button>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- PAINEL DE FORMULÁRIO -->
                    <div class="col-lg-5 col-xl-4">
                        <div class="card card-form p-4">
                            
                            <button type="button" class="btn btn-warning fw-bold shadow-sm mb-4 w-100 py-2" data-bs-toggle="modal" data-bs-target="#modalIA">
                                <i class="bi bi-magic fs-5 me-1"></i> Autopreencher com WhatsApp (IA)
                            </button>

                            <span class="section-title">Informações da Viagem</span>
                            <div class="row g-3 mb-4">
                                <div class="col-12">
                                    <label class="form-label fw-bold small">Cliente</label>
                                    <select th:field="*{cliente}" class="form-select bg-light" required>
                                        <option value="">Selecione...</option>
                                        <option th:each="c : ${listaClientes}" th:value="${c.id}" th:text="${c.razaoSocial}"></option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold small">Origem (Coleta)</label>
                                    <input type="text" th:field="*{origem}" id="inputOrigem" class="form-control" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold small">Destino (Entrega)</label>
                                    <input type="text" th:field="*{destino}" id="inputDestino" class="form-control" required>
                                </div>
                                
                                <div class="col-12">
                                    <label class="form-label fw-bold small text-warning"><i class="bi bi-box-seam"></i> Material Transportado</label>
                                    <textarea th:field="*{materialTransportado}" id="materialTransportado" class="form-control bg-light" rows="2" placeholder="Ex: Sofá, Mudança Completa..."></textarea>
                                </div>
								
								<div class="col-md-4">
								    <label class="form-label fw-bold">Preço do Diesel (R$)</label>
								    <div class="input-group">
								        <span class="input-group-text">R$</span>
								        <input type="number" step="0.01" class="form-control" th:field="*{precoCombustivelNaViagem}">
								    </div>
								    <small class="text-muted">Valor padrão editável.</small>
								</div>
								
                                <div class="col-12">
                                    <button type="button" id="btnCalcular" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm mt-2 py-2">
                                        <i class="bi bi-geo-alt me-1"></i> CALCULAR ROTA
                                    </button>
                                </div>
                            </div>

                            <span class="section-title">Equipe e Gastos Extras</span>
                            <div class="row g-3 mb-4">
                                <div class="col-12">
                                    <label class="form-label fw-bold small">Motorista Responsável</label>
                                    <select th:field="*{motorista}" class="form-select bg-light" required>
                                        <option value="">Selecionar...</option>
                                        <option th:each="m : ${listaMotoristas}" th:value="${m.id}" th:text="${m.nome}"></option>
                                    </select>
                                </div>
                                
                                <div class="col-12">
                                    <label class="form-label fw-bold small">Ajudante(s)</label>
                                    <select th:field="*{ajudantes}" class="form-select bg-light" multiple style="height: 90px;">
                                        <option th:each="m : ${listaMotoristas}" th:value="${m.id}" th:text="${m.nome}"></option>
                                    </select>
                                    <small class="text-muted" style="font-size: 0.70rem;">Segure CTRL para selecionar vários</small>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold small">Veículo</label>
                                    <select th:field="*{veiculo}" class="form-select bg-light" required>
                                        <option value="">Selecione o Veículo...</option>
                                        <option th:each="v : ${listaVeiculos}" th:value="${v.id}" th:text="${v.placa}"></option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold small">Outros Gastos (Pedágio, Diárias) - R$</label>
                                    <input type="number" step="0.01" th:field="*{outrosGastos}" id="inputOutros" class="form-control bg-light" placeholder="0.00">
                                </div>
                            </div>

                            <div class="col-12 text-center bg-dark text-white p-3 rounded-4 shadow-sm mb-4">
                                <div class="row">
                                    <div class="col-6 border-end border-secondary">
                                        <small class="text-muted d-block">Distância Estimada</small>
                                        <strong id="txtDistancia">0 KM</strong>
                                        <input type="hidden" th:field="*{kmEstimado}" id="valKm">
                                    </div>
                                    <div class="col-6">
                                        <small class="text-danger d-block">Custo Total</small>
                                        <strong id="txtTotal" class="text-danger">R$ 0,00</strong>
                                        <input type="hidden" th:field="*{custoTotalEstimado}" id="valTotal">
                                    </div>
                                </div>
                            </div>

                            <span class="section-title">Valores e Logística</span>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label fw-bold small">Valor Combinado (Frete) - R$</label>
                                    <input type="number" step="0.01" th:field="*{valorCombinado}" id="valorCombinado" class="form-control fw-bold text-success" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold small">Data Saída</label>
                                    <input type="date" th:field="*{dataSaida}" class="form-control" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold small">Status</label>
                                    <select th:field="*{status}" class="form-select">
                                        <option value="Pendente">Pendente</option>
                                        <option value="Em Viagem">Em Viagem</option>
                                        <option value="Finalizado">Finalizado</option>
                                    </select>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- PAINEL DO MAPA -->
                    <div class="col-lg-7 col-xl-8">
                        <div class="card card-form overflow-hidden h-100">
                            <div id="mapaRota"></div>
                        </div>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- MODAL DA IA -->
    <div class="modal fade" id="modalIA" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-dark text-white">
            <h5 class="modal-title"><i class="bi bi-robot"></i> Inteligência Artificial Gemini</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <textarea id="textoWhatsApp" class="form-control bg-light border-warning" rows="6" placeholder="Ex: Oi! É um sofá e uma geladeira. A coleta é no Rio e a entrega em Jequié. Fechou 1500 reais."></textarea>
            
            <div id="loadingIA" class="alert alert-info mt-3 d-none">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                <span class="fw-bold">Analisando carga e rotas...</span>
            </div>
          </div>
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-warning fw-bold py-2 w-100" onclick="processarComIA()">
                <i class="bi bi-stars"></i> Gerar Ordem Mágica
            </button>
          </div>
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/base :: scripts}"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('mapaRota').setView([-14.235, -51.925], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        var rotaLayer, markers = [];

        function atualizarTotal() {
            const km = parseFloat(document.getElementById('valKm').value) || 0;
            const outros = parseFloat(document.getElementById('inputOutros').value) || 0;
            const total = (km / 3 * 6) + outros;
            document.getElementById('txtTotal').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('valTotal').value = total.toFixed(2);
        }

        document.getElementById('inputOutros').addEventListener('input', atualizarTotal);

        document.getElementById('btnCalcular').addEventListener('click', async function() {
            const ori = document.getElementById('inputOrigem').value;
            const des = document.getElementById('inputDestino').value;
            if(!ori || !des) return;

            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Calculando...';

            try {
                const resO = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(ori)}`);
                const resD = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(des)}`);
                const dataO = await resO.json();
                const dataD = await resD.json();

                const resR = await fetch(`https://router.project-osrm.org/route/v1/driving/${dataO[0].lon},${dataO[0].lat};${dataD[0].lon},${dataD[0].lat}?geometries=geojson&overview=full`);
                const dataR = await resR.json();

                if(rotaLayer) map.removeLayer(rotaLayer);
                markers.forEach(m => map.removeLayer(m));

                rotaLayer = L.geoJSON(dataR.routes[0].geometry, { style: { color: '#0d6efd', weight: 6 } }).addTo(map);
                map.fitBounds(rotaLayer.getBounds(), { padding: [50, 50] });
                
                markers = [
                    L.marker([dataO[0].lat, dataO[0].lon]).addTo(map).bindPopup("Origem").openPopup(),
                    L.marker([dataD[0].lat, dataD[0].lon]).addTo(map).bindPopup("Destino")
                ];

                const km = (dataR.routes[0].distance / 1000).toFixed(1);
                document.getElementById('txtDistancia').innerText = km + " KM";
                document.getElementById('valKm').value = km;
                atualizarTotal();
                
                // MÁGICA: No celular, faz a tela "descer" suavemente até ao mapa depois de calcular!
                if(window.innerWidth < 992) {
                    setTimeout(() => {
                        document.getElementById('mapaRota').scrollIntoView({ behavior: 'smooth' });
                    }, 500);
                }

            } catch (e) {
                alert("Erro ao traçar rota.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-geo-alt me-1"></i> CALCULAR ROTA';
            }
        });

        async function processarComIA() {
            const texto = document.getElementById('textoWhatsApp').value;
            if(!texto) return alert('Cole a mensagem do cliente!');
            document.getElementById('loadingIA').classList.remove('d-none');

            try {
                const resposta = await fetch('/ia/analisar-frete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: texto })
                });

                const jsonIA = await resposta.json();
                
                if(jsonIA.origem) document.getElementById('inputOrigem').value = jsonIA.origem;
                if(jsonIA.destino) document.getElementById('inputDestino').value = jsonIA.destino;
                if(jsonIA.material) document.getElementById('materialTransportado').value = jsonIA.material;
                
                if(jsonIA.valorCombinado) {
                    let valor = String(jsonIA.valorCombinado).replace(/[^\d.,]/g, '').replace(',', '.');
                    document.getElementById('valorCombinado').value = parseFloat(valor);
                }

                bootstrap.Modal.getInstance(document.getElementById('modalIA')).hide();
                document.getElementById('loadingIA').classList.add('d-none');
                
                if(jsonIA.origem && jsonIA.destino) document.getElementById('btnCalcular').click();

            } catch (erro) {
                alert('Ops! Houve um erro. Verifique se o Back-end está rodando.');
                document.getElementById('loadingIA').classList.add('d-none');
            }
        }
    </script>
</body>
</html>
