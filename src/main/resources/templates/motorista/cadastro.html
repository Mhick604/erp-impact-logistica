<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base :: head('Cadastro de Membro da Equipe')}"></head>

<body class="bg-light text-dark">

    <div th:replace="~{fragments/menu :: sidebar('motoristas')}"></div>

    <!-- 1. CORREÇÃO: WRAPPER RESPONSIVO EM VEZ DE MARGEM FIXA -->
    <div class="content-wrapper">

        <div class="container" style="max-width: 900px;">
            <div class="row justify-content-center">
                <div class="col-12">
                    
                    <div class="card shadow border-0 rounded-4">
                        
                        <div class="card-header text-white p-3 rounded-top-4"
                             th:style="'background-color: ' + (${configApp != null ? configApp.corPrimaria : '#343a40'}) + ' !important;'">
                            <h4 class="mb-0">
                                <i class="bi bi-person-badge"></i> 
                                <span th:text="${motorista.id == null ? ' Cadastrar Membro da Equipe' : ' Editar Membro da Equipe'}"></span>
                            </h4>
                        </div>
                        
                        <div class="card-body p-4 p-md-5">
                            <form th:action="@{/motoristas/salvar}" th:object="${motorista}" method="POST">
                                
                                <input type="hidden" th:field="*{id}">
                                
                                <div class="row g-4">
                                    <div class="col-md-8">
                                        <label class="form-label fw-bold text-secondary">Nome Completo</label>
                                        <input type="text" class="form-control form-control-lg bg-light" th:field="*{nome}" required>
                                    </div>

                                    <!-- AQUI ESTÁ A MÁGICA DE ESCOLHER O CARGO PARA SALVAR NO BANCO -->
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold text-primary">Cargo na Equipe</label>
                                        <select class="form-select form-select-lg border-primary bg-light" th:field="*{cargo}" required>
                                            <option value="">-- Cargo --</option>
                                            <option value="Motorista" class="fw-bold text-primary">👨‍✈️ Motorista</option>
                                            <option value="Ajudante" class="fw-bold text-warning">📦 Ajudante</option>
                                            <option value="Conferente" class="fw-bold text-success">📋 Conferente</option>
                                        </select>
                                    </div>
                                    
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-secondary">CPF</label>
										<input type="text" class="form-control form-control-lg bg-light mask-cpf" th:field="*{cpf}" required>
                                    </div>
                                    
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-secondary">Telefone (WhatsApp)</label>
                                        <input type="text" class="form-control form-control-lg bg-light mask-telefone" th:field="*{telefone}">
                                    </div>
                                    
                                    <!-- DIVISÓRIA VISUAL -->
                                    <div class="col-12 mt-4 mb-2">
                                        <hr class="text-muted">
                                        <h6 class="text-muted fw-bold mb-0">Dados de Habilitação (Opcional para Ajudantes)</h6>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-secondary">Número da CNH</label>
                                        <input type="text" class="form-control form-control-lg bg-light" th:field="*{cnhNumero}">
                                    </div>
                                    
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-secondary">Categoria da CNH</label>
                                        <select class="form-select form-select-lg bg-light" th:field="*{cnhCategoria}">
                                            <option value="">-- Nenhuma --</option>
                                            <option value="B">Categoria B (Carro/Van)</option>
                                            <option value="C">Categoria C (Caminhão Truck)</option>
                                            <option value="D">Categoria D (Ônibus/Micro)</option>
                                            <option value="E">Categoria E (Carreta/Bitrem)</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-secondary">Vencimento da CNH ⚠️</label>
                                        <input type="date" class="form-control form-control-lg bg-light" th:field="*{dataVencimentoCnh}">
                                    </div>
                                    
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-secondary">Status Atual</label>
                                        <select class="form-select form-select-lg bg-light fw-bold" th:field="*{status}">
                                            <option value="Disponível">🟢 Disponível</option>
                                            <option value="Em Viagem">🚚 Em Viagem</option>
                                            <option value="Férias">🏖️ Férias</option>
                                        </select>
                                    </div>
                                    
                                    <!-- 2. CORREÇÃO: BOTÕES EMPILHADOS NO CELULAR -->
                                    <div class="col-12 mt-5 text-end border-top pt-4 d-grid gap-2 d-md-block">
                                        <a th:href="@{/motoristas}" class="btn btn-outline-secondary btn-lg px-4 me-md-2 rounded-pill fw-bold">Cancelar</a>
                                        <button type="submit" class="btn btn-lg px-5 shadow-sm text-white rounded-pill fw-bold"
                                                th:style="'background-color: ' + (${configApp != null ? configApp.corPrimaria : '#343a40'}) + ' !important; border: none;'">
                                            Salvar Membro da Equipe
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/base :: scripts}"></div>
    
</body>
</html>
