<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

    <div th:fragment="sidebar(paginaAtiva)">
        
        <style>
            .btn-menu-toggle { display: none !important; }

            /* MENU RETRÁTIL DESKTOP (Por cima de tudo) */
            .sidebar-hover {
                position: fixed;
                top: 0; left: 0;
                height: 100vh; width: 80px;
                background-color: #343a40; color: #e9ecef;
                z-index: 9999 !important;
                overflow-x: hidden;
                transition: width 0.3s ease;
                box-shadow: 4px 0 15px rgba(0,0,0,0.8);
                display: flex; flex-direction: column;
                white-space: nowrap;
            }

            .sidebar-hover:hover { width: 280px; }

            .sidebar-header {
                height: 80px; display: flex; align-items: center;
                padding-left: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .sidebar-logo-icon { width: 40px; text-align: center; margin-right: 15px; }
            .sidebar-brand-text {font-size: 1.05rem; font-weight: bold; opacity: 0; transition: opacity 0.3s ease; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
            .sidebar-hover:hover .sidebar-brand-text { opacity: 1; }

            .sidebar-nav { flex-grow: 1; padding-top: 15px; display: flex; flex-direction: column; }
            .sidebar-dark-link {
                color: #adb5bd !important; padding: 15px 20px; display: flex;
                align-items: center; text-decoration: none; font-weight: 400;
                font-size: 1rem; border-left: 4px solid transparent; transition: all 0.2s ease;
            }
            .sidebar-dark-link i { font-size: 1.4rem; width: 40px; text-align: center; margin-right: 10px; }
            .link-text { opacity: 0; transition: opacity 0.2s ease; }
            .sidebar-hover:hover .link-text { opacity: 1; }
            
            .sidebar-dark-link:hover { color: #ffffff !important; background-color: rgba(255, 255, 255, 0.03); }
            .sidebar-dark-link.active { color: #ffffff !important; background-color: rgba(255, 255, 255, 0.06); border-left-color: #0d6efd; }
            
            .sidebar-logout { color: #dc3545 !important; }
            .sidebar-logout:hover { background-color: rgba(220, 53, 69, 0.1); }
        </style>

        <div class="sidebar-hover sidebar-desktop">
            <div class="sidebar-header">
                <div class="sidebar-logo-icon">
                    <img th:if="${configApp != null and configApp.nomeLogo != null and !configApp.nomeLogo.isEmpty()}" 
                         th:src="@{'/' + ${configApp.nomeLogo}}" alt="Logo" style="max-height: 35px; max-width: 40px;" class="rounded bg-white p-1">
                    <i th:unless="${configApp != null and configApp.nomeLogo != null and !configApp.nomeLogo.isEmpty()}" 
                       class="bi bi-cpu fs-3 text-primary"></i>
                </div>
                <div class="sidebar-brand-text">		
                    <span th:text="${configApp != null ? configApp.nomeEmpresa : 'Impact ERP'}">Impact ERP</span>
                </div>
            </div>
            
            <div class="sidebar-nav">
                <a th:classappend="${paginaAtiva == 'dashboard'} ? 'active'" class="sidebar-dark-link" th:href="@{/}">
                    <i class="bi bi-speedometer2"></i> <span class="link-text">Dashboard</span>
                </a>
                <a th:classappend="${paginaAtiva == 'clientes'} ? 'active'" class="sidebar-dark-link" th:href="@{/clientes}">
                    <i class="bi bi-people"></i> <span class="link-text">Clientes</span>
                </a>
                <a th:classappend="${paginaAtiva == 'motoristas'} ? 'active'" class="sidebar-dark-link" th:href="@{/motoristas}">
                    <i class="bi bi-person-badge"></i> <span class="link-text">Motoristas</span>
                </a>
                <a th:classappend="${paginaAtiva == 'veiculos'} ? 'active'" class="sidebar-dark-link" th:href="@{/veiculos}">
                    <i class="bi bi-truck"></i> <span class="link-text">Veículos</span>
                </a>
                <a th:classappend="${paginaAtiva == 'fretes'} ? 'active'" class="sidebar-dark-link" th:href="@{/fretes}">
                    <i class="bi bi-map"></i> <span class="link-text">Viagens (OS)</span>
                </a>
                
                <a th:classappend="${paginaAtiva == 'agenda'} ? 'active'" class="sidebar-dark-link" th:href="@{/agenda}">
                    <i class="bi bi-calendar-week"></i> <span class="link-text">Agenda</span>
                </a>

                <a th:classappend="${paginaAtiva == 'despesas'} ? 'active'" class="sidebar-dark-link" th:href="@{/despesas}">
                    <i class="bi bi-currency-dollar"></i> <span class="link-text">Despesas</span>
                </a>
                <a th:classappend="${paginaAtiva == 'configuracoes'} ? 'active'" class="sidebar-dark-link" th:href="@{/configuracoes}">
                    <i class="bi bi-gear"></i> <span class="link-text">Configurações</span>
                </a>
            </div>
            
            <div class="mt-auto mb-4">
                <a class="sidebar-dark-link sidebar-logout" href="/logout">
                    <i class="bi bi-box-arrow-right"></i> <span class="link-text">Sair do Sistema</span>
                </a>
            </div>
        </div>

        <div class="mobile-bottom-bar">
            <a th:href="@{/}" th:classappend="${paginaAtiva == 'dashboard' ? 'active' : ''}">
                <i class="bi bi-speedometer2"></i>
                <span>Painel</span>
            </a>
            <a th:href="@{/fretes}" th:classappend="${paginaAtiva == 'fretes' ? 'active' : ''}">
                <i class="bi bi-map"></i>
                <span>Viagens</span>
            </a>
            
            <a th:href="@{/agenda}" th:classappend="${paginaAtiva == 'agenda' ? 'active' : ''}">
                <i class="bi bi-calendar-week"></i>
                <span>Agenda</span>
            </a>

            <a th:href="@{/motoristas}" th:classappend="${paginaAtiva == 'motoristas' ? 'active' : ''}">
                <i class="bi bi-people"></i>
                <span>Equipe</span>
            </a>
            <a th:href="@{/veiculos}" th:classappend="${paginaAtiva == 'veiculos' ? 'active' : ''}">
                <i class="bi bi-truck"></i>
                <span>Frota</span>
            </a>
        </div>

    </div>

</body>
</html>
