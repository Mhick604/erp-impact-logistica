<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(tituloDaPagina)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- O título muda dinamicamente -->
    <title th:text="${tituloDaPagina} + ' | Impact Logística'">Impact Logística</title>
    
    <!-- 1. Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 2. Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- 3. Font Awesome (Para os ícones do novo painel) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- 4. Seu CSS Customizado -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    
    <div th:fragment="scripts">
        <!-- Scripts do Bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

       
        <!-- MÁSCARAS DE FORMATAÇÃO (jQuery + Mask)     -->
     
        
        <!-- 1. jQuery (O motor necessário para o plugin funcionar) -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        
        <!-- 2. jQuery Mask Plugin -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

        <!-- 3. Ativador Global das Máscaras -->
        <script>
            $(document).ready(function(){
                
                // Lógica inteligente para Telefone: Aceita com e sem o 9º dígito
                var SPMaskBehavior = function (val) {
                  return val.replace(/\D/g, '').length === 11 ? '(00) 00000-0000' : '(00) 0000-00009';
                },
                spOptions = {
                  onKeyPress: function(val, e, field, options) {
                      field.mask(SPMaskBehavior.apply({}, arguments), options);
                    }
                };
				var CpfCnpjMaskBehavior = function (val) {
				    return val.replace(/\D/g, '').length <= 11 ? '000.000.000-009' : '00.000.000/0000-00';
				},
				cpfCnpjpOptions = {
				    onKeyPress: function(val, e, field, options) {
				        field.mask(CpfCnpjMaskBehavior.apply({}, arguments), options);
				    }
				};

				$('.mask-cpf-cnpj').mask(CpfCnpjMaskBehavior, cpfCnpjpOptions);
                
                // Aplicando as máscaras baseadas nas classes CSS
                $('.mask-telefone').mask(SPMaskBehavior, spOptions);
                $('.mask-cpf').mask('000.000.000-00', {reverse: true});
                $('.mask-cnpj').mask('00.000.000/0000-00', {reverse: true});
                $('.mask-cep').mask('00000-000');
                
                // Lógica inteligente para Placa: Aceita o padrão antigo (ABC-1234) e o Mercosul (ABC1D23)
                $('.mask-placa').mask('SSS-0A00', {
                    translation: {
                        'S': { pattern: /[A-Za-z]/ }, // S = Só Letras
                        'A': { pattern: /[A-Za-z0-9]/ } // A = Letras ou Números (para a placa Mercosul)
                    },
                    onKeyPress: function (value, event) {
                        event.target.value = value.toUpperCase(); // Força a placa a ficar sempre em Maiúsculo!
                    }
                });
            });
        </script>
    </div>

</body>
</html>
