<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base :: head('Configurações')}"></head>

<body class="bg-light text-dark">

    <div th:replace="~{fragments/menu :: sidebar('configuracoes')}"></div>

    <!-- ENVOLVÓRIO COM MARGEM DE 80px PARA RESPEITAR O MENU -->
    <div class="content-wrapper">
        
        <!-- Container com largura máxima para não esticar demais em telas gigantes -->
        <div class="container" style="max-width: 1000px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="text-secondary fw-bold">⚙️ Configurações do Sistema</h2>
                    <p class="text-muted">Personalize a identidade visual e os dados oficiais do seu ERP.</p>
                </div>
            </div>

            <div class="card shadow border-0 rounded-4">
                
                <div class="card-header text-white p-3 rounded-top-4"
                     th:style="'background-color: ' + (${configApp != null ? configApp.corPrimaria : '#212529'}) + ' !important;'">
                    <h4 class="mb-0"><i class="bi bi-palette"></i> Identidade Visual e Dados da Empresa</h4>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/configuracoes/salvar}" th:object="${configuracao}" method="POST" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}">
                        
                        <div class="row g-4">
                            <!-- DADOS DA EMPRESA -->
                            <div class="col-md-12">
                                <label class="form-label fw-bold text-secondary">Nome da Empresa</label>
                                <input type="text" class="form-control form-control-lg bg-light" th:field="*{nomeEmpresa}" required>
                            </div>
                            
                            <!-- AQUI ENTRARAM OS CAMPOS NOVOS COM AS MÁSCARAS -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary">CPF / CNPJ da Empresa</label>
                                <input type="text" class="form-control form-control-lg bg-light mask-cpf-cnpj" th:field="*{cnpj}" placeholder="Ex: 00.000.000/0000-00">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary">Telefone / WhatsApp</label>
                                <input type="text" class="form-control form-control-lg bg-light mask-telefone" th:field="*{telefone}" placeholder="Ex: (00) 00000-0000">
                            </div>
                            
                            <!-- DIVISÓRIA -->
                            <div class="col-12 mt-4 mb-2">
                                <hr class="text-muted">
                                <h6 class="text-muted fw-bold mb-0">Cores e Logótipo</h6>
                            </div>
                            
                            <!-- IDENTIDADE VISUAL -->
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-secondary">Cor Primária</label>
                                <input type="color" class="form-control form-control-color w-100 border-0" th:field="*{corPrimaria}" required style="height: 55px;">
                            </div>

                            <div class="col-md-8">
                                <label class="form-label fw-bold text-secondary">Logótipo da Empresa (Opcional)</label>
                                <input type="file" name="foto" class="form-control form-control-lg bg-light" accept="image/png, image/jpeg">
                                <small class="text-muted">Selecione uma imagem (PNG ou JPG) no seu computador.</small>
                            </div>

                            <!-- O Certo é /uploads/ para a imagem aparecer! -->
                            <div class="col-12 mt-3" th:if="${configuracao.nomeLogo != null and !configuracao.nomeLogo.isEmpty()}">
                                <div class="p-3 bg-white border rounded shadow-sm d-inline-block">
                                    <p class="small text-muted mb-2 fw-bold">Logo Atual:</p>
                                    <img th:src="@{'/uploads/' + ${configuracao.nomeLogo}}" alt="Logo" style="max-height: 80px;">
                                </div>
                            </div>
                            
                            <div class="col-12 mt-5 text-end pt-3 border-top">
                                <button type="submit" class="btn btn-lg px-5 shadow rounded-pill text-white w-100 fw-bold" 
                                        th:style="'background-color: ' + (${configApp != null ? configApp.corPrimaria : '#198754'}) + ' !important; border: none;'">
                                    Guardar Configurações 💾
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/base :: scripts}"></div>

</body>
</html>
