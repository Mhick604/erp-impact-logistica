<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançar Despesa | Impact Logística</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
		
    <div th:replace="~{fragments/menu :: sidebar('despesas')}"></div>

    <div class="container mt-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-header text-white p-3 rounded-top-4"
                         th:style="'background-color: ' + (${configApp != null ? configApp.corPrimaria : '#dc3545'}) + ' !important;'">
                        <h4 class="mb-0">
                            <i class="bi bi-cash-coin"></i> 
                            <span th:text="${despesa.id == null ? ' Lançar Nova Despesa' : ' Editar Despesa'}"></span>
                        </h4>
                    </div>
                    
                    <div class="card-body p-4">
                        <form th:action="@{/despesas/salvar}" th:object="${despesa}" method="POST">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold text-secondary">🛣️ Referente a qual Viagem (OS)?</label>
                                    <select class="form-select bg-light" th:field="*{frete}" required>
                                        <option value="">-- Selecione a Viagem --</option>
                                        <option th:each="f : ${listaFretes}" th:value="${f.id}" th:text="'OS ' + ${f.id} + ' - ' + ${f.origem} + ' ➔ ' + ${f.destino} + ' (' + (${f.cliente != null ? f.cliente.razaoSocial : 'Avulso'}) + ')'"></option>
                                    </select>
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary">Tipo de Despesa</label>
                                    <select class="form-select bg-light" th:field="*{tipo}" required>
                                        <option value="Óleo Diesel">⛽ Óleo Diesel</option>
                                        <option value="Pedágio">🛣️ Pedágio</option>
                                        <option value="Alimentação">🍔 Alimentação</option>
                                        <option value="Chapa/Ajudante">💪 Chapa/Ajudante</option>
                                        <option value="Manutenção">🔧 Manutenção</option>
                                        <option value="Outros">Outros...</option>
                                    </select>
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary">Data</label>
                                    <input type="date" class="form-control bg-light" th:field="*{data}" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary">Valor (R$)</label>
                                    <input type="number" step="0.01" class="form-control bg-light" th:field="*{valor}" placeholder="Ex: 150.00" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary">Observação (Opcional)</label>
                                    <input type="text" class="form-control bg-light" th:field="*{observacao}" placeholder="Ex: Posto Graal">
                                </div>
                                
                                <div class="col-12 mt-4 text-end">
                                    <a th:href="@{/despesas}" class="btn btn-outline-secondary btn-lg px-4 me-2 rounded-pill">Cancelar</a>
                                    
                                    <button type="submit" class="btn btn-lg px-5 shadow-sm text-white rounded-pill"
                                            th:style="'background-color: ' + (${configApp != null ? configApp.corPrimaria : '#dc3545'}) + ' !important; border: none;'">
                                        Lançar Despesa
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
